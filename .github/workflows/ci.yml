name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: localhost:5000
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # -------------------------- Stage 1: Lint-----------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (flake8)
        run: flake8 api/main.py worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps (including eslint)
        run: npm ci
        working-directory: frontend

      - name: Lint JavaScript (eslint)
        run: npm run lint
        working-directory: frontend

      - name: Install hadolint
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles (hadolint)
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # Stage 2: Test
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest api/tests/ \
            --cov=api \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -------------------------Stage 3: Build ------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # --------------------Stage 4: Security Scan -----------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images into local daemon for scanning
        run: |
          docker buildx build --load -t api:scan ./api
          docker buildx build --load -t worker:scan ./worker
          docker buildx build --load -t frontend:scan ./frontend

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan API image with Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-api.sarif \
            api:scan

      - name: Scan worker image with Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-worker.sarif \
            worker:scan

      - name: Scan frontend image with Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-frontend.sarif \
            frontend:scan

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # -------------------- Stage 5: Integration Test ------------------------------------
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          cat <<EOF > .env
          REDIS_PASSWORD=integrationtestpass
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          APP_ENV=production
          EOF

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for frontend to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              $(docker compose ps -q frontend) 2>/dev/null || echo "starting")
            echo "Attempt $i: frontend health = $STATUS"
            if [ "$STATUS" = "healthy" ]; then exit 0; fi
            sleep 5
          done
          echo "Frontend never became healthy"
          docker compose logs
          exit 1

      - name: Submit a job and poll until completed
        run: |
          chmod +x integration.sh
          FRONTEND_URL=http://localhost:3000 TIMEOUT=60 bash integration.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ------------------- Stage 6: Deploy -------------------------------------
  # RUns on pushes to main only
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with rolling update
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST || 'redis' }}
          REDIS_PORT: ${{ secrets.REDIS_PORT || '6379' }}
          API_URL: ${{ secrets.API_URL || 'http://api:8000' }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '3000' }}
          APP_ENV: ${{ secrets.APP_ENV || 'production' }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Write the remote script to a temp file to avoid heredoc quoting issues
          cat > /tmp/deploy.sh << SCRIPT
          set -e
          cd ~/app
          git pull origin main

          # Write .env with production values
          printf 'REDIS_PASSWORD=%s\nREDIS_HOST=%s\nREDIS_PORT=%s\nAPI_URL=%s\nFRONTEND_PORT=%s\nAPP_ENV=%s\n' \
            "\$REDIS_PASSWORD" "\$REDIS_HOST" "\$REDIS_PORT" "\$API_URL" "\$FRONTEND_PORT" "\$APP_ENV" > .env

          for SERVICE in api worker frontend; do
            echo "Rolling update: \$SERVICE"
            OLD_CONTAINER=\$(docker compose ps -q \$SERVICE 2>/dev/null || true)
            docker compose up -d --no-deps --build \$SERVICE
            NEW_CONTAINER=\$(docker compose ps -q \$SERVICE)
            ELAPSED=0
            while [ \$ELAPSED -lt 60 ]; do
              STATUS=\$(docker inspect --format='{{.State.Health.Status}}' \$NEW_CONTAINER 2>/dev/null || echo "starting")
              echo "\$SERVICE health: \$STATUS (\${ELAPSED}s)"
              if [ "\$STATUS" = "healthy" ]; then
                echo "\$SERVICE is healthy - stopping old container"
                [ -n "\$OLD_CONTAINER" ] && docker stop \$OLD_CONTAINER || true
                break
              fi
              if [ \$ELAPSED -ge 59 ]; then
                echo "\$SERVICE health check timed out - aborting"
                docker stop \$NEW_CONTAINER || true
                [ -n "\$OLD_CONTAINER" ] && docker start \$OLD_CONTAINER || true
                exit 1
              fi
              sleep 5
              ELAPSED=\$((ELAPSED + 5))
            done
          done
          echo "Deployment complete"
          SCRIPT

          # Pass REDIS_PASSWORD as env var and run the script on the server
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no /tmp/deploy.sh $DEPLOY_USER@$DEPLOY_HOST:/tmp/deploy.sh
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST \
            "REDIS_PASSWORD='$REDIS_PASSWORD' REDIS_HOST='$REDIS_HOST' REDIS_PORT='$REDIS_PORT' API_URL='$API_URL' FRONTEND_PORT='$FRONTEND_PORT' APP_ENV='$APP_ENV' bash /tmp/deploy.sh"
